<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formular</title>
  <link rel="stylesheet" href="style.css">
  <style>

  </style>
</head>

<body>
  <div class="Alles">
    <h1>Formular</h1>
    <p>
    <h3>Füllen Sie ein Formular aus</h3>
    </p>

    <form id="personalData">
      <p>
        <label for="Vorname">Vorname:</label>
        <input type="text" id="Vorname" name="Vorname" required />
      </p>
      <p>
        <label for="Nachname">Nachname:</label>
        <input type="text" id="Nachname" name="Nachname" required />
      </p>
      <p>
        <label for="E-Mail">Email:</label>
        <input type="email" id="E-Mail" name="E-Mail" required />
      </p>
      <p>
        <label for="Passwort">Passwort:</label>
        <input type="password" name="Passwort" id="Passwort" required />
      </p>
      <p>
        <label for="Telefonnummer">Telefonnummer:</label>
        <input type="tel" id="Telefonnummer" name="Telefonnummer" required />
      </p>
      <p>
        <label for="Geburtsdatum">Geburtsdatum:</label>
        <input type="date" id="Geburtsdatum" name="Geburtsdatum" required />
      </p>
      <p>
        <input type="submit" class="submitbutton" id="submitbutton" />
      </p>
    </form>
    <a href="Übersicht.html">Übersicht</a>
  </div>

  <script src="script.js"> </script>
</body>

</html>
